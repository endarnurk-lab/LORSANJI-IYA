<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORSAN JI IYA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Dasar & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #111111; line-height: 1.6; }
        a { text-decoration: none; color: inherit; }
        
        /* Navigasi */
        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eeeeee; position: sticky; top: 0; background: #fff; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav ul li a { font-size: 14px; text-transform: uppercase; font-weight: 600; transition: color 0.3s; }
        nav ul li a:hover { color: #888; }

        /* Bagian Umum */
        section { padding: 80px 50px; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align: center; font-size: 32px; font-weight: 300; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 3px; }

        /* Galeri */
        .filter-menu { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { background: none; border: 1px solid #111; padding: 10px 20px; cursor: pointer; font-family: inherit; font-size: 14px; transition: all 0.3s; }
        .filter-btn.active, .filter-btn:hover { background: #111; color: #fff; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .gallery-item { width: 100%; height: 350px; object-fit: cover; transition: opacity 0.5s ease; }
        .gallery-item.hide { display: none; }

        /* Tentang Saya */
        .about-content { display: flex; gap: 50px; align-items: center; }
        .about-text { flex: 1; font-size: 16px; color: #555; }
        .about-img { flex: 1; height: 400px; background: #eee; background-image: url(logo.jpeg); background-size: cover; background-position: center; }

        /* Form Kontak */
        .contact-form { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        input, textarea { width: 100%; padding: 15px; border: 1px solid #ccc; font-family: inherit; font-size: 14px; }
        textarea { resize: vertical; min-height: 150px; }
        input:focus, textarea:focus { outline: none; border-color: #111; }
        .btn-submit { background: #111; color: #fff; border: none; padding: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: background 0.3s; }
        .btn-submit:hover { background: #333; }

        /* Footer & Sosial Media */
        footer { text-align: center; padding: 40px; border-top: 1px solid #eee; margin-top: 40px; }
        .social-links { margin-bottom: 20px; }
        .social-links a { font-size: 24px; margin: 0 15px; transition: color 0.3s; }
        .social-links a:hover { color: #888; }

        /* Tombol WhatsApp Mengambang */
        .wa-float { position: fixed; bottom: 30px; right: 30px; background-color: #25d366; color: #fff; border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); z-index: 1000; transition: transform 0.3s; }
        .wa-float:hover { transform: scale(1.1); }

        /* Responsivitas untuk HP */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 20px; padding: 20px; }
            section { padding: 40px 20px; }
            .about-content { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- Header / Navigasi -->
    <header>
        <div class="logo">L O R S A N</div>
        <nav>
            <ul>
                <li><a href="#galeri">Galeri</a></li>
                <li><a href="#tentang">Tentang</a></li>
                <li><a href="#kontak">Kontak</a></li>
            </ul>
        </nav>
    </header>

    <!-- Bagian Galeri -->
    <section id="galeri">
        <h2 class="section-title">ANAK ANAKA DI SABANTANG</h2>
        <div class="filter-menu">
            <button class="filter-btn active" onclick="filterSelection('all')">MOMENT</button>
           
        </div>

        <div class="gallery-grid">
            <!-- Ganti URL src dengan foto asli klien -->
            <img src="nanaka1.jpeg" class="gallery-item portrait" alt="Portrait">
            <img src="nanaka2.jpeg" class="gallery-item wedding" alt="Wedding">
            <img src="nanaka3.jpeg" class="gallery-item produk" alt="Produk">
            <img src="nanaka4.jpeg" class="gallery-item portrait" alt="Portrait">
            <img src="nanaka5.jpeg" class="gallery-item wedding" alt="Wedding">
            <img src="nanaka6.jpeg" class="gallery-item produk" alt="Produk">
        </div>
    </section>

    <!-- Bagian Tentang Saya -->
    <section id="tentang">
        <h2 class="section-title">Tentang Kami</h2>
        <div class="about-content">
            <div class="about-img"></div>
            <div class="about-text">
                <p>Mari satukan  anak anak yanggg gila semua</p>
                <br>
                <p></p>
            </div>
        </div>
    </section>

    <!-- Bagian Kontak -->
    <section id="kontak">
        <h2 class="section-title">Hubungi Kami</h2>
        <form class="contact-form" onsubmit="kirimKeWhatsApp(event)">
    <input type="text" id="wa_nama" placeholder="Nama Lengkap" required>
    <textarea id="wa_pesan" placeholder="kata_kata ta dulu kanda..." required></textarea>
    <button type="submit" class="btn-submit">Kirim via WhatsApp</button>
</form>

<script>
function kirimKeWhatsApp(event) {
    event.preventDefault(); // Mencegah halaman dimuat ulang
    
    // Ambil data dari form
    var nama = document.getElementById("wa_nama").value;
    var pesan = document.getElementById("wa_pesan").value;
    
    // Nomor WA Anda (gunakan 62 tanpa tanda +)
    var nomorWA = "6289519528951"; 
    
    // Buat format teks untuk WA
    var teksWA = "Halo, nama saya " + nama + ".%0A%0A" + pesan;
    
    // Buka tab baru ke WhatsApp
    window.open("https://wa.me/" + nomorWA + "?text=" + teksWA, "_blank");
}
</script>
    </section>

    <!-- Footer -->
    <footer>
        <div class="social-links">
            <!-- Ganti URL href dengan link medsos klien -->
            <a href="https://www.instagram.com/lorsan_id?igsh=N285OGZ6bm1nZDFh&utm_source=qr" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin"></i></a>
        </div>
        <p>&copy; 2026 LORSAN. Anak-Anakaji iya.</p>
    </footer>

    <!-- Tombol WhatsApp -->
    <!-- Ganti nomor 6281234567890 dengan nomor WA klien Anda (gunakan format 62 tanpa +) -->
    <a href="https://wa.me/6281234567890?text=Halo,%20saya%20tertarik%20dengan%20jasa%20fotografi%20Anda." class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Script Filter Galeri -->
    <script>
        function filterSelection(c) {
            var x, i;https://linkedin.com/
            x = document.getElementsByClassName("gallery-item");
            if (c == "all") c = "";
            for (i = 0; i < x.length; i++) {
                x[i].classList.remove("hide");
                if (x[i].className.indexOf(c) == -1) {
                    x[i].classList.add("hide");
                }
            }
            
            // Mengubah status tombol aktif
            var btns = document.getElementsByClassName("filter-btn");
            for (i = 0; i < btns.length; i++) {
                btns[i].addEventListener("click", function() {
                    var current = document.getElementsByClassName("active");
                    current[0].className = current[0].className.replace(" active", "");
                    this.className += " active";
                });
            }
        }
    </script>
</body>
</html>
